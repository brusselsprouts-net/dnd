<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="chrome=1">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/journal_style.css">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="shortcut icon" href="/favicon.ico?" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <main role="main" id="main" class="phb">
    {% include navigation.html %}
    <div class="journal-container">
      <aside class="journal-toc">
        <!-- include the toc from the data file automatically -->
        <h3>Table of Contents</h3>
        <ul>
          {% for item in site.data.journal_toc %}
          <li><a href="{{item.url}}">{{item.title}}</a></li>
          {% endfor %}
        </ul>
      </aside>
      <article class="journal-content">
        {{ content }}
      </article>
    </div>
  </main>
  <footer role="contentinfo" id="contentinfo">
  </footer>
  <script>
    <!-- make names automatically get colored -->
  </script>
</body>

</html>
